[program:scheduler]
process_name=%(program_name)s
command=/bin/bash -c "while true; do php /app/artisan schedule:run --verbose --no-interaction >> /app/storage/logs/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=root
redirect_stderr=true
stdout_logfile=/app/storage/logs/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
startsecs=0
priority=10
