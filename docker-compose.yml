services:
  # Servidor web con FrankenPHP
  frankenphp:
    build:
      context: .
      dockerfile: ./docker/frankenphp/Dockerfile
    container_name: noticias_frankenphp
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app:cached
      - ./docker/frankenphp/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "8000:80"
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=noticias
      - DB_USERNAME=noticias
      - DB_PASSWORD=noticias123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - noticias_network

  # Base de datos PostgreSQL con pgvector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: noticias_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=noticias
      - POSTGRES_USER=noticias
      - POSTGRES_PASSWORD=noticias123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - noticias_network
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c max_connections=200

  # Redis para cache y colas
  redis:
    image: redis:7-alpine
    container_name: noticias_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - noticias_network
    command: redis-server --appendonly yes

  # Horizon para monitoreo de colas
  horizon:
    build:
      context: .
      dockerfile: ./docker/frankenphp/Dockerfile
    container_name: noticias_horizon
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app:cached
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=noticias
      - DB_USERNAME=noticias
      - DB_PASSWORD=noticias123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - HORIZON_MEMORY_LIMIT=256
      - HORIZON_BALANCE_MAX_SHIFT=1
      - HORIZON_BALANCE_COOLDOWN=3
    command: php artisan horizon
    networks:
      - noticias_network

  # Reverb para WebSockets
  reverb:
    build:
      context: .
      dockerfile: ./docker/frankenphp/Dockerfile
    container_name: noticias_reverb
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app:cached
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=noticias
      - DB_USERNAME=noticias
      - DB_PASSWORD=noticias123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REVERB_APP_ID=noticias-platform
      - REVERB_APP_KEY=noticias-platform-key
      - REVERB_APP_SECRET=noticias-platform-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    networks:
      - noticias_network

  # Mailpit para testing de emails
  mailpit:
    image: axllent/mailpit
    container_name: noticias_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - noticias_network

volumes:
  postgres_data:
  redis_data:

networks:
  noticias_network:
    driver: bridge
